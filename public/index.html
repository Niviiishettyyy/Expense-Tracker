<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body :class="themeClass()" class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 min-h-screen p-6 space-y-6 fixed border-r-2 transition"
         :class="themeClassSidebar()">
    <h2 class="text-2xl font-bold text-center">💼 Tracker</h2>
    <nav class="space-y-4">
      <a href="index.html" class="block px-3 py-2 rounded"
         :class="window.location.pathname.includes('index.html') ? 'active' : ''">🏠 Dashboard</a>
      <a href="add-expense.html" class="block px-3 py-2 rounded"
         :class="window.location.pathname.includes('add-expense.html') ? 'active' : ''">➕ Add Expense</a>
      <a href="expenses.html" class="block px-3 py-2 rounded"
         :class="window.location.pathname.includes('expenses.html') ? 'active' : ''">📋 View Expenses</a>
      <a href="category.html" class="block px-3 py-2 rounded"
         :class="window.location.pathname.includes('category.html') ? 'active' : ''">📊 Category Breakdown</a>
      <a href="settings.html" class="block px-3 py-2 rounded"
         :class="window.location.pathname.includes('settings.html') ? 'active' : ''">⚙️ Settings</a>
      <a href="logout.html" class="block px-3 py-2 rounded"
         :class="window.location.pathname.includes('logout.html') ? 'active' : ''">🚪 Logout</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-6 ml-64 page-transition space-y-8">
    <h1 class="text-4xl font-bold mb-6">
      💰 Expense Tracker Dashboard - Welcome, <span x-text="profileName"></span>
    </h1>

    <!-- 💰 Financial Summary Panel -->
    <section class="card p-6 space-y-4 max-w-4xl mx-auto">
      <h2 class="text-xl font-bold mb-4">💰 Financial Summary</h2>
      <div class="grid md:grid-cols-2 gap-4 text-sm">
        <div><strong>Opening Balance:</strong> <span x-text="currency"></span><span x-text="openingBalance"></span></div>
        <div><strong>Current Balance:</strong> <span x-text="currency"></span><span x-text="currentBalance"></span></div>
        <div><strong>Remaining Budget:</strong> <span x-text="currency"></span><span x-text="remainingBudget"></span></div>
        <div><strong>Total Expenses:</strong> <span x-text="currency"></span><span x-text="total"></span></div>
        <div><strong>Top Category:</strong> <span x-text="topCategory"></span></div>
        <div><strong>Entries:</strong> <span x-text="expenses.length"></span></div>
      </div>
    </section>
  </main>

<script>
function app() {
  return {
    expenses: [],
    total: 0,
    topCategory: '—',
    currency: localStorage.getItem('currency') || '₹',
    profileName: localStorage.getItem('profileName') || 'User',
    budgetLimit: Number(localStorage.getItem('budgetLimit')) || 5000,
    openingBalance: Number(localStorage.getItem('openingBalance')) || 20000,

    async init() {
      if (localStorage.getItem('loggedIn') !== 'true') {
        window.location.href = "login.html";
      }
      try {
        const res = await fetch('http://localhost:3000/api/expenses');
        if (!res.ok) throw new Error("Failed to fetch expenses");
        this.expenses = await res.json();
        this.total = this.expenses.reduce((sum, e) => sum + Number(e.amount), 0);

        const totals = {};
        this.expenses.forEach(e => {
          totals[e.category] = (totals[e.category] || 0) + Number(e.amount);
        });
        const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
        this.topCategory = sorted.length ? sorted[0][0] : '—';
      } catch (error) {
        alert("❌ Error loading expenses: " + error.message);
      }
    },

    get currentBalance() {
      return this.openingBalance - this.expenses.reduce((sum,e)=>sum+Number(e.amount||0),0);
    },
    get remainingBudget() {
      const spentThisMonth = this.expenses
        .filter(e => e.date && e.date.startsWith(new Date().toISOString().slice(0,7)))
        .reduce((sum,e)=>sum+Number(e.amount||0),0);
      return this.budgetLimit - spentThisMonth;
    },

    themeClass() {
      switch (localStorage.getItem('themeStyle')) {
        case 'dark': return 'theme-dark';
        case 'light': return 'theme-light';
        case 'sunset': return 'theme-sunset';
        case 'ocean': return 'theme-ocean';
        case 'forest': return 'theme-forest';
        case 'midnight': return 'theme-midnight';
        default: return 'theme-default';
      }
    },

    themeClassSidebar() {
      switch (localStorage.getItem('themeStyle')) {
        case 'sunset': return 'bg-gradient-to-b from-orange-100 to-orange-200 text-orange-900 border-orange-300';
        case 'ocean': return 'bg-gradient-to-b from-blue-100 to-blue-200 text-blue-900 border-blue-300';
        case 'forest': return 'bg-gradient-to-b from-green-100 to-green-200 text-green-900 border-green-300';
        case 'midnight': return 'bg-gradient-to-b from-gray-950 to-gray-800 text-white border-gray-800';
        case 'dark': return 'bg-gradient-to-b from-gray-900 to-gray-800 text-white border-gray-700';
        case 'light':
        case 'default': return 'bg-gradient-to-b from-indigo-50 to-indigo-100 text-gray-800 border-indigo-200';
        default: return '';
      }
    }
  }
}
</script>
</body>
</html>
