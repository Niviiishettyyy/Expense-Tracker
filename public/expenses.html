<!DOCTYPE html>
<html lang="en" x-data="expenseViewer()" x-init="loadExpenses()">
<head>
  <meta charset="UTF-8">
  <title>View Expenses</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- PDF export requirements -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body :class="themeClass()" class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 min-h-screen p-6 space-y-6 fixed border-r-2 transition"
       :class="{
  'bg-gradient-to-b from-orange-100 to-orange-200 text-orange-900 border-orange-300': themeStyle==='sunset',
  'bg-gradient-to-b from-blue-100 to-blue-200 text-blue-900 border-blue-300': themeStyle==='ocean',
  'bg-gradient-to-b from-green-100 to-green-200 text-green-900 border-green-300': themeStyle==='forest',
  'bg-gradient-to-b from-gray-950 to-gray-800 text-white border-gray-800': themeStyle==='midnight',
  'bg-gradient-to-b from-indigo-50 to-indigo-100 text-gray-800 border-indigo-200': themeStyle==='default' || themeStyle==='light',
  'bg-gradient-to-b from-gray-900 to-gray-800 text-white border-gray-700': themeStyle==='dark'
}">
  <h2 class="text-2xl font-bold text-center">💼 Tracker</h2>
  <nav class="space-y-4">
    <a href="index.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('index.html') ? 'active' : ''">🏠 Dashboard</a>
    <a href="add-expense.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('add-expense.html') ? 'active' : ''">➕ Add Expense</a>
    <a href="expenses.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('expenses.html') ? 'active' : ''">📋 View Expenses</a>
    <a href="category.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('category.html') ? 'active' : ''">📊 Category Breakdown</a>
    <a href="settings.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('settings.html') ? 'active' : ''">⚙️ Settings</a>
    <a href="logout.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('logout.html') ? 'active' : ''">🚪 Logout</a>
  </nav>
</aside>

  <!-- Main -->
  <main class="flex-1 p-6 ml-64 page-transition">
    <h1 class="text-3xl font-bold mb-6">📋 View Expenses</h1>

    <!-- Toolbar -->
    <div class="card shadow p-4 mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <!-- Search -->
      <div class="relative w-full md:w-1/3">
        <input type="text" placeholder="Search expenses..."
               x-model="searchQuery"
               class="input w-full pl-10">
        <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">🔍</span>
      </div>
      <!-- Export Buttons -->
      <div class="flex gap-3">
        <button @click="exportCSV" class="btn-primary px-4 py-2 rounded shadow hover:scale-105">📄 Export CSV</button>
        <button @click="exportPDF" class="btn-primary px-4 py-2 rounded shadow hover:scale-105">🖨️ Export PDF</button>
      </div>
    </div>

    <template x-if="loading">
      <p class="text-gray-500">Loading expenses...</p>
    </template>

    <template x-if="error">
      <p class="text-red-600 font-semibold">❌ Error: <span x-text="error"></span></p>
    </template>

    <template x-if="expenses.length === 0 && !loading">
      <p class="text-gray-500">No expenses found.</p>
    </template>

    <!-- Grouped by month -->
    <template x-if="expenses.length > 0">
      <div class="space-y-10">
        <template x-for="group in groupedByMonth()" :key="group.month">
          <div>
            <h2 class="text-xl font-bold mb-2" x-text="formatMonth(group.month)"></h2>
            <div class="overflow-x-auto">
              <table class="min-w-full border rounded shadow">
                <thead class="bg-indigo-500 text-left">
                  <tr>
                    <th class="px-4 py-2">Date</th>
                    <th class="px-4 py-2">Amount</th>
                    <th class="px-4 py-2">Category</th>
                    <th class="px-4 py-2">Note</th>
                    <th class="px-4 py-2">Mood</th>
                    <th class="px-4 py-2">Actions</th> <!-- ✅ Added -->
                  </tr>
                </thead>
                <tbody>
                  <template x-for="expense in group.items" :key="expense.id">
                    <tr class="border-t" :style="'background-color: white;'">
                      <td class="px-4 py-2" x-text="expense.date"></td>
                      <td class="px-4 py-2" x-text="expense.amount.toFixed(2)"></td>
                      <td class="px-4 py-2" x-text="expense.category"></td>
                      <td class="px-4 py-2" x-text="expense.note || '-'"></td>
                      <td class="px-4 py-2" x-text="expense.mood || '-'"></td>
                      <td class="px-4 py-2">
                        <button @click="deleteExpense(expense.id)"
                                class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
                          🗑 Delete
                        </button>
                      </td>
                    </tr>
                  </template>
                  <!-- Total row -->
                  <tr class="border-t font-bold bg-gray-100">
                    <td class="px-4 py-2" colspan="6">
                      Total: ₹<span x-text="monthTotal(group.items)"></span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </div>
    </template>
  </main>

<script>
function expenseViewer() {
  return {
    expenses: [],
    loading: true,
    error: '',
    searchQuery: '',
    themeStyle: localStorage.getItem('themeStyle') || 'default',

    async loadExpenses() {
      try {
        const res = await fetch('http://localhost:3000/api/expenses');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        this.expenses = await res.json();
      } catch (err) {
        this.error = err.message;
      } finally {
        this.loading = false;
      }
    },

    async deleteExpense(id) {
      try {
        const res = await fetch(`http://localhost:3000/api/expenses/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        this.expenses = this.expenses.filter(e => e.id !== id);
        alert('✅ Expense deleted!');
      } catch (err) {
        alert('❌ Error deleting expense: ' + err.message);
      }
    },

        filteredExpenses() {
      if (!this.searchQuery) return this.expenses;
      const q = this.searchQuery.toLowerCase();
      return this.expenses.filter(e =>
        (e.category && e.category.toLowerCase().includes(q)) ||
        (e.note && e.note.toLowerCase().includes(q)) ||
        (e.mood && e.mood.toLowerCase().includes(q)) ||
        (e.date && e.date.toLowerCase().includes(q))
      );
    },

    groupedByMonth() {
      const groups = {};
      this.filteredExpenses().forEach(e => {
        const month = e.date.slice(0,7); // YYYY-MM
        if (!groups[month]) groups[month] = [];
        groups[month].push(e);
      });
      return Object.keys(groups)
        .sort((a, b) => b.localeCompare(a)) // newer first
        .map(m => ({ month: m, items: groups[m] }));
    },

    formatMonth(month) {
      const [year, mon] = month.split("-");
      const date = new Date(year, mon-1);
      return date.toLocaleString('default', { month: 'long', year: 'numeric' });
    },

    monthTotal(items) {
      return items.reduce((sum, e) => sum + Number(e.amount), 0).toFixed(2);
    },

    exportCSV() {
      let csv = "Date,Amount,Category,Note,Mood\n";
      this.expenses.forEach(e => {
        csv += `${e.date},${e.amount},${e.category},${e.note || ''},${e.mood || ''}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = "expenses.csv";
      a.click();
      alert("✅ CSV downloaded!");
    },

    exportPDF() {
  try {
    if (!window.jspdf || !window.jspdf.jsPDF) {
      alert("❌ jsPDF not loaded correctly");
      return;
    }

    const doc = new window.jspdf.jsPDF();
    const moodText = {
      "😐 Necessary": "Necessary",
      "😍 Treat": "Treat",
      "😤 Regret": "Regret",
      "🤔 Impulse": "Impulse"
    };

    // Title
    doc.setFontSize(16);
    doc.text("Expenses Report", 14, 15);

    // Group expenses by month
    const groups = {};
    this.expenses.forEach(e => {
      const month = e.date.slice(0, 7); // YYYY-MM
      if (!groups[month]) groups[month] = [];
      groups[month].push(e);
    });

    const sortedMonths = Object.keys(groups).sort((a, b) => b.localeCompare(a));
    let currentY = 25;

    sortedMonths.forEach(month => {
      const items = groups[month];
      const formattedMonth = new Date(month + "-01").toLocaleString('default', {
        month: 'long',
        year: 'numeric'
      });

      doc.setFontSize(14);
      doc.text(formattedMonth, 14, currentY);
      currentY += 6;

      const headers = [["Date", "Amount", "Category", "Note", "Mood"]];
      const rows = items.map(e => [
        e.date,
        Number(e.amount).toFixed(2),
        e.category || "-",
        e.note || "-",
        moodText[e.mood] || "-"
      ]);

      doc.autoTable({
        head: headers,
        body: rows,
        startY: currentY,
        theme: 'grid',
        styles: {
          fontSize: 10,
          cellPadding: 3,
          lineColor: [200, 200, 200],
          lineWidth: 0.2,
          fillColor: [255, 255, 255],
          textColor: [0, 0, 0]
        },
        headStyles: {
          fillColor: [99, 102, 241],
          textColor: 255,
          lineColor: [99, 102, 241],
          lineWidth: 0.2
        },
        margin: { left: 14, right: 14 },
        didDrawPage: (data) => {
          currentY = data.cursor.y + 10;
        }
      });
    });

    doc.save("expenses.pdf");
    alert("✅ PDF downloaded!");
  } catch (err) {
    alert("❌ Error generating PDF: " + err.message);
  }
},


    async deleteExpense(id) {
      try {
        const res = await fetch(`http://localhost:3000/api/expenses/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        this.expenses = this.expenses.filter(e => e.id !== id);
        alert('✅ Expense deleted!');
      } catch (err) {
        alert('❌ Error deleting expense: ' + err.message);
      }
    },

    themeClass() {
      switch (this.themeStyle) {
        case 'dark': return 'theme-dark';
        case 'light': return 'theme-light';
        case 'sunset': return 'theme-sunset';
        case 'ocean': return 'theme-ocean';
        case 'forest': return 'theme-forest';
        case 'midnight': return 'theme-midnight';
        default: return 'theme-default';
      }
    }
  }
}
</script>
</body>
</html>
