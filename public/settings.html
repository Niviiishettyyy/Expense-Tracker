<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body :class="themeClass()" class="flex min-h-screen">
 <!-- Sidebar -->
  <aside class="w-64 min-h-screen p-6 space-y-6 fixed border-r-2 transition"
       :class="{
  'bg-gradient-to-b from-orange-100 to-orange-200 text-orange-900 border-orange-300': themeStyle==='sunset',
  'bg-gradient-to-b from-blue-100 to-blue-200 text-blue-900 border-blue-300': themeStyle==='ocean',
  'bg-gradient-to-b from-green-100 to-green-200 text-green-900 border-green-300': themeStyle==='forest',
  'bg-gradient-to-b from-gray-950 to-gray-800 text-white border-gray-800': themeStyle==='midnight',
  'bg-gradient-to-b from-indigo-50 to-indigo-100 text-gray-800 border-indigo-200': themeStyle==='default' || themeStyle==='light',
  'bg-gradient-to-b from-gray-900 to-gray-800 text-white border-gray-700': themeStyle==='dark'
}">
  <h2 class="text-2xl font-bold text-center">💼 Tracker</h2>
  <nav class="space-y-4">
    <a href="index.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('index.html') ? 'active' : ''">🏠 Dashboard</a>

    <a href="add-expense.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('add-expense.html') ? 'active' : ''">➕ Add Expense</a>

    <a href="expenses.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('expenses.html') ? 'active' : ''">📋 View Expenses</a>

    <a href="category.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('category.html') ? 'active' : ''">📊 Category Breakdown</a>

    <a href="settings.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('settings.html') ? 'active' : ''">⚙️ Settings</a>

    <a href="logout.html" class="block px-3 py-2 rounded"
       :class="window.location.pathname.includes('logout.html') ? 'active' : ''">🚪 Logout</a>
  </nav>
</aside>


  <!-- Main Content -->
  <main class="flex-1 p-6 ml-64 page-transition">
    <h1 class="text-3xl font-bold mb-6">⚙️ Settings</h1>

    <section class="card shadow rounded p-6 space-y-6 max-w-2xl">
      <!-- Currency -->
      <div class="flex items-center justify-between">
        <span>💱 Currency Symbol</span>
        <select x-model="currency" @change="saveCurrency" class="input w-40">
          <option value="₹">₹ Rupee</option>
          <option value="$">$ Dollar</option>
          <option value="€">€ Euro</option>
        </select>
      </div>

      <!-- Profile -->
      <div class="flex items-center justify-between">
        <span>👤 Profile Name</span>
        <input type="text" x-model="profileName" @keyup.enter="saveProfile" class="input w-40">
      </div>

      <!-- Budget Limit -->
      <div class="flex items-center justify-between">
        <span>📊 Monthly Budget Limit</span>
        <input type="number" x-model="budgetLimit" @change="saveBudgetLimit" class="input w-32">
      </div>

      <!-- Opening Balance -->
      <div class="flex items-center justify-between">
        <span>💰 Opening Balance</span>
        <input type="number" x-model="openingBalance" @change="saveOpeningBalance" class="input w-32">
      </div>

      <!-- Theme -->
      <div class="flex items-center justify-between">
        <span>🎨 Theme Style</span>
        <select x-model="themeStyle" @change="saveThemeStyle" class="input w-48">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="default">Default Gradient</option>
          <option value="sunset">Sunset (orange → pink)</option>
          <option value="ocean">Ocean (cyan → blue)</option>
          <option value="forest">Forest (green → emerald)</option>
          <option value="midnight">Midnight (indigo → purple)</option>
        </select>
      </div>

      <!-- Preview -->
      <div class="mt-6 border-t pt-4 text-sm text-gray-600">
        <p>Preview: <span x-text="currency"></span> Expenses by <span x-text="profileName"></span></p>
        <p>Budget Limit: <span x-text="currency"></span><span x-text="budgetLimit"></span></p>
        <p>Opening Balance: <span x-text="currency"></span><span x-text="openingBalance"></span></p>
        <p>Theme: <span x-text="themeStyle"></span></p>
      </div>
    </section>
  </main>

<script>
function app() {
  return {
    currency: '₹',
    profileName: 'User',
    budgetLimit: 5000,
    openingBalance: 20000,
    themeStyle: 'default',

    init() {
      this.currency = localStorage.getItem('currency') || '₹';
      this.profileName = localStorage.getItem('profileName') || 'User';
      this.budgetLimit = Number(localStorage.getItem('budgetLimit')) || 5000;
      this.openingBalance = Number(localStorage.getItem('openingBalance')) || 20000;
      this.themeStyle = localStorage.getItem('themeStyle') || 'default';
    },

    themeClass() {
      switch (localStorage.getItem('themeStyle')) {
        case 'dark': return 'theme-dark';
        case 'light': return 'theme-light';
        case 'sunset': return 'theme-sunset';
        case 'ocean': return 'theme-ocean';
        case 'forest': return 'theme-forest';
        case 'midnight': return 'theme-midnight';
        default: return 'theme-default';
      }
    },

    saveCurrency() {
      localStorage.setItem('currency', this.currency);
    },
    saveProfile() {
      localStorage.setItem('profileName', this.profileName);
      alert("Profile name saved: " + this.profileName);
    },
    saveBudgetLimit() {
      localStorage.setItem('budgetLimit', this.budgetLimit);
      alert("Budget limit saved: " + this.currency + this.budgetLimit);
    },
    saveOpeningBalance() {
      localStorage.setItem('openingBalance', this.openingBalance);
      alert("Opening balance saved: " + this.currency + this.openingBalance);
    },
    saveThemeStyle() {
      localStorage.setItem('themeStyle', this.themeStyle);
      location.reload();
    }
  }
}
</script>
</body>
</html>
